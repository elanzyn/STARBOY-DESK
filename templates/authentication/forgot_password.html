{% extends 'base/base.html' %}
{% block title %}Recuperar senha | STARBOY DESK{% endblock %}
{% block content %}
<section class="mx-auto flex min-h-[calc(100vh-9rem)] max-w-3xl items-center px-4 py-12 sm:px-6 lg:px-8">
    <div class="glass w-full rounded-[2rem] p-6 sm:p-8">
        <p class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-500">Senha corporativa</p>
        <h1 class="mt-3 text-3xl font-bold text-white">Solicitar recuperação</h1>
        <p class="mt-2 text-sm text-slate-400">O pedido ficará pendente até aprovação do superadmin.</p>

        <form method="post" class="mt-6 space-y-5">
            {% csrf_token %}
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300">Email</label>
                {{ form.email }}
            </div>
            <button type="submit" class="rounded-2xl bg-white px-5 py-3 text-sm font-bold text-slate-950 transition hover:opacity-90">
                Enviar solicitação
            </button>
        </form>
    </div>
</section>
{% endblock %}
