{% extends 'base/base.html' %}
{% block title %}Redefinir senha | STARBOY DESK{% endblock %}
{% block content %}
<section class="mx-auto flex min-h-[calc(100vh-9rem)] max-w-3xl items-center px-4 py-12 sm:px-6 lg:px-8">
    <div class="glass w-full rounded-[2rem] p-6 sm:p-8">
        <p class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-500">Redefinição</p>
        <h1 class="mt-3 text-3xl font-bold text-white">Definir nova senha</h1>
        <p class="mt-2 text-sm text-slate-400">Solicitação para {{ reset_request.user.email }}.</p>

        <form method="post" class="mt-6 space-y-5">
            {% csrf_token %}
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300">Nova senha</label>
                {{ form.password1 }}
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300">Confirmar nova senha</label>
                {{ form.password2 }}
            </div>
            <button type="submit" class="rounded-2xl bg-white px-5 py-3 text-sm font-bold text-slate-950 transition hover:opacity-90">
                Redefinir senha
            </button>
        </form>
    </div>
</section>
{% endblock %}
