{% extends 'base/base.html' %}
{% block title %}Cadastrar | STARBOY DESK{% endblock %}
{% block content %}
<div class="w-full max-w-md mx-auto py-16">
    <h2 class="text-2xl font-bold mb-6">Cadastrar</h2>
    <form method="post" class="space-y-4 bg-zinc-900 p-8 rounded-xl border border-zinc-800">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-indigo-600 py-2 rounded text-white font-semibold hover:bg-indigo-700">Cadastrar</button>
    </form>
</div>
{% endblock %}
