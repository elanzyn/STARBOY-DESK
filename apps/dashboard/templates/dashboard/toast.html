<div class="fixed right-4 top-4 z-50 space-y-2">
    {% if messages %}
        {% for message in messages %}
            <div x-data="{ open: true }" x-show="open" x-transition class="glass-panel flex min-w-80 items-start gap-2.5 px-3.5 py-2.5">
                <div class="mt-0.5 h-2.5 w-2.5 rounded-full {% if message.tags == 'success' %}bg-emerald-400{% elif message.tags == 'warning' %}bg-amber-400{% else %}bg-indigo-400{% endif %}"></div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-white">{{ message }}</p>
                </div>
                <button @click="open = false" class="text-slate-500 transition hover:text-white" aria-label="Fechar mensagem">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M18 6 6 18M6 6l12 12" stroke-width="1.75" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
        {% endfor %}
    {% endif %}
</div>
